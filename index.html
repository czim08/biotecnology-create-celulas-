<script>
const API = "http://localhost:8000";

// --- Helpers de Logs y Estabilidad ---
function log(msg) { console.log(msg); } // O vincula a un div de log en tu HTML

function computeStability(weight, logP) {
    if(weight < 500 && logP < 5) return "Alta";
    if(weight < 800) return "Media";
    return "Baja";
}

// --- Funciones de Fetch Real ---
async function checkSafety(q) {
    const res = await fetch(`${API}/safety/${q}`);
    const data = await res.json();
    if(data.status === "blocked") {
        log("> ⚠ Consulta bloqueada por seguridad");
        return false;
    }
    return true;
}

async function analyzeReal(input) {
    try {
        const res = await fetch(`${API}/analyze/${input}`);
        const data = await res.json();
        if(data.error) {
            log("> Error científico: " + data.error);
            return;
        }
        log("> Fórmula: " + data.formula);
        log("> Peso: " + data.peso_molecular);
        log("> LogP: " + data.logP);
        log("> TPSA: " + data.TPSA);
        log("> Estabilidad: " + computeStability(data.peso_molecular, data.logP));
    } catch(e) {
        log("> Backend no disponible");
    }
}

async function searchPubChem(q) {
    const res = await fetch(`${API}/pubchem/${q}`);
    const data = await res.json();
    try {
        const props = data.PropertyTable.Properties[0];
        log("> PubChem Fórmula: " + props.MolecularFormula);
        log("> PubChem Peso: " + props.MolecularWeight);
    } catch {
        log("> Sin datos en PubChem");
    }
}

async function searchNCBIReal(q) {
    const res = await fetch(`${API}/ncbi/${q}`);
    const data = await res.json();
    log("> NCBI IDs: " + data.ids.join(", "));
}

// --- Orquestador Principal (Advanced Forge) ---
const originalForge = typeof runAdvancedForge !== 'undefined' ? runAdvancedForge : () => { log("> Ejecutando proceso base..."); };

const combinedForge = async function() {
    const input = document.getElementById('substanceInput').value.toLowerCase();
    
    log("> BioOS v6 IA iniciada");

    // 1. Filtro de Seguridad
    const safe = await checkSafety(input);
    if(!safe) return;

    // 2. Ejecución de análisis en paralelo
    await analyzeReal(input);
    await searchPubChem(input);
    await searchNCBIReal(input);

    // 3. Ejecutar lógica original si existe
    originalForge();
}

// Asignación al disparador (ejemplo: un botón)
// document.getElementById('btnRun').onclick = combinedForge;
</script>
