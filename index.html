<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioOS v9.0 | Immuno-Strike</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background: #010409; color: #94a3b8; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        #viewer3d { width: 100%; height: 500px; border-radius: 2rem; border: 2px solid rgba(79, 70, 229, 0.1); }
        .attack-glow { box-shadow: 0 0 30px rgba(34, 197, 94, 0.2); }
        .pulse-red { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="fixed top-6 right-6 z-50">
        <button onclick="toggleMenu()" class="p-3 rounded-full text-white text-2xl bg-indigo-600/20 hover:bg-indigo-600/40">⋮</button>
        <div id="advancedMenu" class="hidden absolute right-0 mt-2 w-64 glass-panel rounded-2xl p-4 shadow-2xl border border-indigo-500/30">
            <h3 class="text-xs font-bold text-indigo-400 mb-3 uppercase tracking-widest">Protocolos Avanzados</h3>
            <button onclick="simulateAttack()" class="w-full text-left text-[10px] text-white py-2 hover:text-green-400">⚡ Ejecutar Ataque de Anticuerpos</button>
            <button onclick="alert('Exportando modelo 3D...')" class="w-full text-left text-[10px] text-white py-2 hover:text-indigo-300">💾 Exportar para VR/3D</button>
        </div>
    </div>

    <header class="max-w-7xl mx-auto mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-black text-white italic tracking-tighter">Bio<span class="text-green-500">OS</span> v9.0</h1>
            <p class="text-[10px] text-green-400 font-bold uppercase tracking-[0.5em]">Immuno-Strike Tactical Interface</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-4">
            <div class="glass-panel p-6 rounded-3xl border-t border-indigo-500/50">
                <label class="text-[10px] font-bold text-indigo-400 uppercase block mb-3">Objetivo Biológico / Sustancia</label>
                <input id="subInput" type="text" class="w-full bg-black/40 p-4 rounded-2xl text-sm text-white border border-white/10 outline-none focus:border-green-500 transition-all" placeholder="Ej: Malaria + Anticuerpo">
                <button onclick="runSentinelForge()" class="w-full mt-4 bg-gradient-to-r from-indigo-600 to-green-600 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-[0.2em] hover:scale-[1.02] transition-all">SINTETIZAR Y ATACAR</button>
            </div>

            <div class="glass-panel p-5 rounded-3xl space-y-4">
                <div>
                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Efectividad de Neutralización</p>
                    <div class="flex items-center gap-3">
                        <span id="effPct" class="text-3xl font-black text-green-400">0%</span>
                        <div class="flex-1 bg-slate-800 h-3 rounded-full overflow-hidden">
                            <div id="effBar" class="bg-green-500 h-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div id="statusTag" class="text-[10px] font-bold text-center p-2 rounded-lg bg-slate-800 uppercase tracking-widest">Estado: Standby</div>
            </div>

            <div id="terminal" class="glass-panel p-4 rounded-2xl h-32 overflow-y-auto text-[9px] font-mono leading-relaxed bg-black/60">
                <p class="text-green-500">> Sistema de Inmunología Táctica Listo.</p>
            </div>
        </div>

        <div class="lg:col-span-8 relative">
            <div id="viewer3d" class="attack-glow"></div>
            <div id="bioHazard" class="hidden absolute top-0 left-0 w-full h-full flex items-center justify-center bg-red-900/40 backdrop-blur-sm z-10 rounded-2xl">
                <div class="text-center">
                    <div class="text-6xl pulse-red mb-4">⚠️</div>
                    <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Acceso Denegado</h2>
                    <p class="text-xs text-red-200">Protocolo de Seguridad de Armas Biológicas Activo</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let viewer = $3Dmol.createViewer("viewer3d", { backgroundColor: "none" });
        
        function toggleMenu() { document.getElementById('advancedMenu').classList.toggle('hidden'); }

        function runSentinelForge() {
            const input = document.getElementById('subInput').value.toLowerCase();
            const terminal = document.getElementById('terminal');
            const hazard = document.getElementById('bioHazard');

            if (input.includes("antrax") || input.includes("ebola") || input.includes("veneno")) {
                hazard.classList.remove('hidden');
                terminal.innerHTML += `<p class="text-red-500 font-bold">> ALERTA: Intento de síntesis de patógeno nivel 4 detectado.</p>`;
                return;
            }

            hazard.classList.add('hidden');
            terminal.innerHTML += `<p class="text-indigo-400">> Buscando afinidades químicas para: ${input}...</p>`;
            
            // Simular proceso de ataque
            simulateAttack();
        }

        function simulateAttack() {
            const eff = Math.floor(Math.random() * (98 - 65) + 65);
            document.getElementById('effPct').innerText = eff + "%";
            document.getElementById('effBar').style.width = eff + "%";
            document.getElementById('statusTag').innerText = "Estado: Neutralizando Patógeno";
            document.getElementById('statusTag').className = "text-[10px] font-bold text-center p-2 rounded-lg bg-green-900/40 text-green-400 uppercase tracking-widest";
            
            renderAttackVisuals();
        }

        function renderAttackVisuals() {
            viewer.clear();
            // Cargamos un complejo de proteína (Simulando el anticuerpo atacando al virus)
            $3Dmol.download("pdb:1SFO", viewer, {}, function() {
                viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
                viewer.zoomTo();
                viewer.render();
                
                // Animación de rotación rápida simulando interacción dinámica
                viewer.animate({loop: "backAndForth", step: 2});
                
                document.getElementById('terminal').innerHTML += `<p class="text-green-400">> [SUCCESS] Enlace molecular establecido. Degradación viral en curso.</p>`;
            });
        }
    </script>
</body>
</html>
