<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIS INFINITY | Apex Bio-OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020408;
            --panel: #0d1117;
            --neon-blue: #58a6ff;
            --neon-green: #3fb950;
            --neon-red: #f85149;
            --neon-purple: #bc8cff;
            --border: 1px solid #30363d;
        }

        * { box-sizing: border-box; cursor: crosshair; }
        body {
            margin: 0; background: var(--bg-deep); color: #c9d1d9;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        /* --- TOP BAR: CRITICAL MONITORING --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 30px; background: rgba(13, 17, 23, 0.95); border-bottom: 2px solid var(--neon-blue);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
        }
        .os-identity { font-family: 'Orbitron'; font-size: 22px; color: var(--neon-blue); letter-spacing: 4px; }
        .patient-card { 
            display: flex; gap: 20px; font-size: 12px; border-left: 1px solid #333; padding-left: 20px;
        }
        .status-pulse { width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- DASHBOARD GRID --- */
        .app-grid {
            display: grid; grid-template-columns: 360px 1fr 380px;
            gap: 12px; padding: 12px; height: calc(100vh - 75px);
        }

        .module { 
            background: var(--panel); border: var(--border); border-radius: 6px; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .module-head { 
            background: rgba(255,255,255,0.03); padding: 10px 15px; 
            font-family: 'Orbitron'; font-size: 10px; color: var(--neon-blue);
            border-bottom: var(--border); display: flex; justify-content: space-between;
        }

        /* --- CENTRAL VIEWPORT: MULTIMEDIA HYBRID --- */
        .viewport { flex-grow: 1; position: relative; background: #000; overflow: hidden; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; display: none; opacity: 0.7; filter: hue-rotate(180deg) brightness(1.2) contrast(1.1); }
        #render-3d { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 140px; text-shadow: 0 0 30px var(--neon-blue); }
        
        .hud-scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(88, 166, 255, 0.2); animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* --- INPUTS & CONTROLS --- */
        .ui-scroll { padding: 15px; overflow-y: auto; flex-grow: 1; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #8b949e; margin-bottom: 6px; font-weight: 600; }
        select, input {
            width: 100%; background: #010409; border: var(--border);
            color: #fff; padding: 12px; border-radius: 4px; font-family: 'Rajdhani'; font-size: 15px;
        }

        .btn-prime {
            width: 100%; padding: 16px; background: var(--neon-blue); color: #000;
            border: none; border-radius: 4px; font-family: 'Orbitron'; font-weight: bold;
            cursor: pointer; transition: 0.3s; clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }
        .btn-prime:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(88, 166, 255, 0.4); }

        /* --- COMPARADOR DE DATOS --- */
        .metric-box { 
            background: rgba(0,0,0,0.4); padding: 12px; border-radius: 4px; border-left: 3px solid var(--neon-blue);
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .metric-val { font-family: 'Fira Code'; font-size: 18px; color: var(--neon-green); }

        /* --- AI STRATEGY BOX --- */
        .ai-intel {
            background: rgba(188, 140, 255, 0.08); border: 1px solid var(--neon-purple);
            padding: 15px; border-radius: 4px; margin: 15px;
        }

        /* --- EXTENDED SCROLL SECTION --- */
        .data-deep-dive { padding: 60px 30px; background: #0d1117; border-top: var(--border); }
        .heatmap {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 20px;
        }
        .heat-cell { height: 30px; background: #161b22; border-radius: 2px; }
        .heat-high { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
    </style>
</head>
<body>

<header>
    <div class="os-identity">OMNIS INFINITY</div>
    <div class="patient-card">
        <div><label>ID:</label> #PX-2026</div>
        <div><label>TIPO:</label> GEN-EDIT-H</div>
        <div><label>STABIL:</label> <span class="status-pulse"></span> 98.4%</div>
    </div>
    <div style="font-family:'Fira Code'; font-size:11px; color:#555;">BIO-LINK: SECURED</div>
</header>

<main class="app-grid">
    <aside class="module">
        <div class="module-head">ENGINEERING_TERMINAL</div>
        <div class="ui-scroll">
            <div class="field">
                <label>PATÓGENO DE REFERENCIA</label>
                <select id="pato">
                    <option>SARS-CoV-2 (Delta Variant)</option>
                    <option>Glioblastoma Multiforme V4</option>
                    <option>H5N1 Avian Influenza</option>
                </select>
            </div>
            <div class="field">
                <label>VECTORES DE ENTREGA (ELEMENTOS)</label>
                <select>
                    <option>Lipid Nanoparticles (LNP)</option>
                    <option>Adeno-Associated Virus (AAV9)</option>
                    <option>Synthetic Exosomes</option>
                </select>
            </div>
            <div class="field">
                <label>DOSIFICACIÓN DE PRECISIÓN (nM)</label>
                <input type="number" value="12.50" step="0.01">
            </div>

            <button class="btn-prime" onclick="processGenome()">INICIAR SECUENCIACIÓN</button>

            <div style="background:#000; padding:10px; margin-top:20px; border:1px solid #222; border-radius:4px;">
                <label>LOGS DE PROCESAMIENTO</label>
                <div id="logs" style="font-family:'Fira Code'; font-size:10px; color:var(--neon-green); height:110px; overflow-y:auto;">
                    > System ready...
                </div>
            </div>
        </div>
    </aside>

    <div class="module">
        <div class="module-head">
            <span>REAL-TIME VISUALIZATION</span>
            <div style="display:flex; gap:10px;">
                <button onclick="switchView('3d')" style="background:none; border:1px solid var(--neon-blue); color:#fff; font-size:9px;">3D VIEW</button>
                <button onclick="switchView('video')" style="background:none; border:1px solid var(--neon-blue); color:#fff; font-size:9px;">VIDEO LIVE</button>
            </div>
        </div>
        <div class="viewport">
            <div class="hud-scanline"></div>
            <video id="video-feed" loop muted autoplay>
