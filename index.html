<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioOS v21.0 | Aethelgard Legacy Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --accent: #6366f1; --bg: #020617; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #94a3b8; height: 100vh; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-dark { background: #000 !important; border: 1px solid #1e293b !important; color: #fff !important; font-size: 11px; outline: none; }
        #viewer3d { width: 100%; height: 100%; border-radius: 2rem; background: #000; }
        #kineticCanvas { background: #000; border-radius: 1.5rem; width: 100%; height: 280px; border: 1px solid #1e293b; }
        .tab-btn { border-bottom: 2px solid transparent; color: #64748b; transition: 0.3s; cursor: pointer; padding: 12px; font-size: 10px; font-weight: bold; }
        .tab-btn.active { border-color: var(--accent); color: white; background: rgba(99, 102, 241, 0.1); }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen p-4 gap-4">

    <header class="flex justify-between items-center px-8 glass py-4 rounded-3xl border-b border-indigo-500/30">
        <div>
            <h1 class="text-2xl font-black text-white italic tracking-tighter">BioOS <span class="text-indigo-500">LEGACY</span></h1>
            <p class="text-[8px] text-indigo-400 tracking-[0.4em] uppercase font-bold">Protocolo de Investigación Avanzada v21.0</p>
        </div>
        <div class="flex gap-6 items-center">
            <div class="text-right text-[9px]">
                <p class="text-slate-500 uppercase">Estado del Bio-Reactor</p>
                <p class="text-green-500 font-bold status-pulse">OPTIMIZADO</p>
            </div>
        </div>
    </header>

    <div class="flex flex-1 gap-4 overflow-hidden">
        
        <aside class="w-[500px] flex flex-col gap-3 glass p-5 rounded-[2.5rem] border border-white/5">
            
            <nav class="flex border-b border-white/10 mb-2 justify-around">
                <button id="btn-lab" class="tab-btn active">🔬 LABORATORIO</button>
                <button id="btn-report" class="tab-btn">📝 BITÁCORA</button>
                <button id="btn-video" class="tab-btn text-indigo-400">🎬 VIDEO</button>
            </nav>

            <div class="flex-1 overflow-y-auto space-y-4 pr-1">
                
                <div id="content-lab" class="space-y-4">
                    <div class="p-4 bg-black/40 rounded-2xl border border-white/5">
                        <p class="text-[9px] text-indigo-400 font-bold uppercase mb-3">Selección de Patógeno & Análisis</p>
                        <select id="pathogenSelect" class="input-dark w-full p-3 rounded-xl mb-3">
                            <option value="hiv">VIH-1 (Retrovirus)</option>
                            <option value="ebola">Ébola (Filovirus)</option>
                            <option value="sars2">SARS-CoV-2 (Corona)</option>
                            <option value="h5n1">H5N1 (Gripe Aviar 2026)</option>
                            <option value="sintetica">Bacteria Benéfica Sintética (X-1)</option>
                        </select>
                        <input id="subInput" type="text" class="input-dark w-full p-3 rounded-xl mb-3" placeholder="Diseñar cura/agente...">
                        <button id="runBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-black uppercase">Ejecutar Simulación</button>
                    </div>

                    <div id="stats" class="grid grid-cols-2 gap-2">
                        <div class="p-3 bg-black/60 rounded-xl border-t-2 border-green-500 text-center">
                            <p class="text-[8px] text-slate-500 uppercase">Eficacia</p>
                            <span id="effVal" class="text-xl font-bold text-white">0%</span>
                        </div>
                        <div class="p-3 bg-black/60 rounded-xl border-t-2 border-red-500 text-center">
                            <p class="text-[8px] text-slate-500 uppercase">Mortalidad</p>
                            <span id="mortVal" class="text-xl font-bold text-red-500">0%</span>
                        </div>
                    </div>
                </div>

                <div id="content-report" class="hidden space-y-3">
                    <div class="p-4 bg-black/40 rounded-2xl border border-white/5 h-full flex flex-col">
                        <p class="text-[9px] text-indigo-400 font-bold uppercase mb-2">Redacción de Hallazgos y Observaciones</p>
                        <textarea id="reportArea" class="input-dark w-full flex-1 p-4 rounded-xl resize-none h-64 mb-3" placeholder="Escriba aquí los detalles de la investigación, síntomas observados, o el comportamiento de la nueva bacteria..."></textarea>
                        <button onclick="saveReport()" class="bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 py-2 rounded-xl text-[9px] font-bold uppercase">Guardar en Base de Datos</button>
                    </div>
                </div>

                <div id="content-video" class="hidden space-y-3">
                    <div class="bg-black p-4 rounded-2xl border border-indigo-500/20">
                        <canvas id="kineticCanvas"></canvas>
                        <div class="grid grid-cols-2 gap-2 mt-3">
                            <button onclick="addParticle('pathogen')" class="bg-red-500/20 text-red-400 p-2 rounded-lg text-[9px] font-bold">+ Virus</button>
                            <button onclick="addParticle('agent')" class="bg-blue-500/20 text-blue-400 p-2 rounded-lg text-[9px] font-bold">+ Cura</button>
                        </div>
                    </div>
                </div>

            </div>

            <div id="terminal" class="bg-black/80 p-3 rounded-2xl h-24 text-[9px] font-mono text-indigo-400 overflow-y-auto border border-white/5">
                > BioOS Inicializado correctamente.<br>
                > BSL-4 Sentinel: Listo para operar.
            </div>
        </aside>

        <main class="flex-1 glass rounded-[3.5rem] overflow-hidden relative">
            <div id="viewer3d"></div>
            <div class="absolute bottom-8 right-8 flex flex-col gap-2">
                <div id="pdbLabel" class="bg-black/60 px-6 py-2 rounded-full border border-white/10 text-xs text-indigo-300 font-bold">PDB: 1SFO</div>
            </div>
        </main>
    </div>

    <script>
        // --- MOTOR DE INTERFAZ (Eventos fijos) ---
        const viewer = $3Dmol.createViewer("viewer3d", { backgroundColor: "none" });

        document.getElementById('btn-lab').addEventListener('click', () => switchTab('lab'));
        document.getElementById('btn-report').addEventListener('click', () => switchTab('report'));
        document.getElementById('btn-video').addEventListener('click', () => switchTab('video'));
        document.getElementById('runBtn').addEventListener('click', runSimulation);

        function switchTab(tabId) {
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('active');
            if(tabId === 'video') resizeCanvas();
        }

        // --- LÓGICA MÉDICA ---
        const pathogenData = {
            hiv: { pdb: "1HHP", mort: "99%", eff: 45 },
            ebola: { pdb: "4IBK", mort: "80%", eff: 30 },
            sars2: { pdb: "6VXX", mort: "2%", eff: 80 },
            h5n1: { pdb: "2H5N", mort: "52%", eff: 50 },
            sintetica: { pdb: "6SBN", mort: "0%", eff: 95 }
        };

        function runSimulation() {
            const pKey = document.getElementById('pathogenSelect').value;
            const data = pathogenData[pKey];
            
            document.getElementById('effVal').innerText = (data.eff + Math.floor(Math.random()*15)) + "%";
            document.getElementById('mortVal').innerText = data.mort;
            document.getElementById('pdbLabel').innerText = "PDB: " + data.pdb;
            
            renderStructure(data.pdb);
            log(`Analizando ${pKey}... Estructura cargada.`);
        }

        function renderStructure(pdbId) {
            viewer.clear();
            $3Dmol.download("pdb:" + pdbId, viewer, {}, function() {
                viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
                viewer.zoomTo();
                viewer.render();
            });
        }

        function saveReport() {
            const text = document.getElementById('reportArea').value;
            if(text) {
                log("Reporte guardado en el archivo del sistema.");
                alert("Redacción guardada con éxito.");
            }
        }

        // --- MOTOR KINÉTICO (VIDEO) ---
        const canvas = document.getElementById('kineticCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = 280;
        }

        class Particle {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.color = type === 'pathogen' ? '#ef4444' : '#6366f1';
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x<0 || this.x>canvas.width) this.vx*=-1;
                if(this.y<0 || this.y>canvas.height) this.vy*=-1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        function addParticle(type) { for(let i=0; i<15; i++) particles.push(new Particle(type)); }
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.type === 'agent') {
                    particles.forEach((p2, j) => {
                        if(p2.type === 'pathogen' && Math.hypot(p.x-p2.x, p.y-p2.y) < 10) particles.splice(j, 1);
                    });
                }
            });
            requestAnimationFrame(animate);
        }

        function log(msg) {
            const term = document.getElementById('terminal');
            term.innerHTML += `> ${msg}<br>`;
            term.scrollTop = term.scrollHeight;
        }

        window.onload = () => { resizeCanvas(); animate(); };
    </script>
</body>
</html>
