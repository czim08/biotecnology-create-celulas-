<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioOS v16.1 | Aethelgard Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --tox-red: #ff4757; --bio-green: #2ecc71; --sentinel-indigo: #6366f1; }
        body { font-family: 'JetBrains Mono', monospace; background: #010409; color: #94a3b8; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); }
        .input-dark { background: #000 !important; border: 1px solid #1e293b !important; color: #fff !important; font-size: 11px; }
        #viewer3d { width: 100%; height: 100%; border-radius: 2rem; background: radial-gradient(circle, #0f172a 0%, #000 100%); }
        #kineticCanvas { background: #000; border-radius: 1.5rem; width: 100%; height: 250px; display: block; }
        .hidden { display: none; }
        .tab-btn { border-bottom: 2px solid transparent; color: #64748b; transition: all 0.3s; cursor: pointer; }
        .tab-btn.active { border-color: var(--sentinel-indigo); color: white; font-weight: bold; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen p-4 gap-4">

    <header class="flex justify-between items-center px-8 glass py-4 rounded-3xl border-b border-indigo-500/20">
        <div>
            <h1 class="text-2xl font-black text-white italic tracking-tighter">Bio<span class="text-indigo-500">OS</span> v16.1</h1>
            <p class="text-[8px] text-indigo-400 tracking-[0.4em] uppercase font-bold">Aethelgard Labs Fixed System</p>
        </div>
        <div class="flex gap-4">
            <div id="statusIndicator" class="flex items-center gap-2 px-4 py-1 rounded-full bg-green-500/10 border border-green-500/20">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-green-500 font-bold uppercase">Sistemas Nominal</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 gap-4 overflow-hidden">
        <aside class="w-[450px] flex flex-col gap-3 glass p-4 rounded-3xl border border-white/5">
            
            <div class="flex border-b border-white/10 mb-2 justify-around text-[9px] pb-2">
                <button onclick="switchTab('lab')" id="tab-lab" class="tab-btn active px-2 py-1">🔬 LAB</button>
                <button onclick="switchTab('pathogens')" id="tab-pathogens" class="tab-btn px-2 py-1">🦠 AGENTES</button>
                <button onclick="switchTab('genesis')" id="tab-genesis" class="tab-btn px-2 py-1">🧬 GENESIS</button>
                <button onclick="switchTab('visual')" id="tab-visual" class="tab-btn px-2 py-1 text-indigo-400">🎬 VIDEO</button>
            </div>

            <div class="flex-1 overflow-y-auto pr-1 custom-scroll space-y-4">
                
                <div id="content-lab" class="space-y-3">
                    <section class="glass p-4 rounded-2xl border-l-4 border-indigo-500">
                        <p class="text-[9px] font-bold text-indigo-400 mb-2 uppercase">Sintetizador de Curas</p>
                        <input id="subInput" type="text" class="input-dark w-full p-3 rounded-xl mb-3" placeholder="Sustancia + Patógeno">
                        <button onclick="runLabsAnalysis()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-[10px] uppercase">ANALIZAR</button>
                    </section>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="glass p-3 rounded-xl border border-white/5 text-center">
                            <p class="text-[8px] text-slate-500 mb-1">EFICACIA</p>
                            <span id="effVal" class="text-xl font-bold text-white">0%</span>
                        </div>
                        <div class="glass p-3 rounded-xl border border-white/5 text-center">
                            <p class="text-[8px] text-slate-500 mb-1">MUTACIÓN</p>
                            <span id="mutProb" class="text-xl font-bold text-orange-400">0%</span>
                        </div>
                    </div>
                </div>

                <div id="content-pathogens" class="hidden space-y-3">
                    <section class="glass p-4 rounded-2xl border-l-4 border-yellow-500">
                        <select id="pathogenSelect" onchange="updatePathogenInfo()" class="input-dark w-full p-3 rounded-lg mb-3">
                            <option value="">Seleccionar Patógeno...</option>
                            <option value="hiv">VIH (Virus)</option>
                            <option value="sars">SARS-CoV-2 (Virus)</option>
                            <option value="mrsa">MRSA (Bacteria)</option>
                        </select>
                        <div id="pathogenDetails" class="text-[10px] text-slate-300 space-y-2"></div>
                    </section>
                </div>

                <div id="content-genesis" class="hidden space-y-3">
                    <section class="glass p-4 rounded-2xl border-l-4 border-green-500">
                        <p class="text-[9px] text-green-500 font-bold mb-2">DISEÑO DE VIDA SINTÉTICA</p>
                        <button onclick="runGenesisSimulation()" class="w-full bg-green-500/20 text-green-500 font-bold py-3 rounded-xl text-[10px] uppercase border border-green-500/30">SECUENCIAR ADN</button>
                    </section>
                    <div id="genesisLog" class="p-3 bg-black/50 text-[9px] font-mono h-32 overflow-y-auto rounded-xl border border-white/5 hidden"></div>
                </div>

                <div id="content-visual" class="hidden space-y-3">
                    <section class="glass p-4 rounded-2xl border-l-4 border-indigo-400">
                        <div class="flex justify-between items-center mb-2">
                            <p class="text-[9px] font-bold text-indigo-400 uppercase">Kinetic Video Monitor</p>
                            <span class="text-[7px] px-2 py-0.5 rounded bg-red-500 text-white animate-pulse">REC</span>
                        </div>
                        <canvas id="kineticCanvas"></canvas>
                        <div class="grid grid-cols-2 gap-2 mt-3">
                            <button onclick="addParticle('pathogen')" class="bg-red-500/10 border border-red-500/30 text-red-400 p-2 rounded-lg text-[9px] font-bold">+ VIRUS</button>
                            <button onclick="addParticle('agent')" class="bg-blue-500/10 border border-blue-500/30 text-blue-400 p-2 rounded-lg text-[9px] font-bold">+ CURA</button>
                        </div>
                    </section>
                </div>

            </div>
            
            <div id="terminal" class="glass p-3 rounded-2xl h-24 text-[9px] font-mono text-indigo-400/80 overflow-y-auto bg-black/50">
                > Sistema v16.1 parcheado. Listo.
            </div>
        </aside>

        <main class="flex-1 glass rounded-[3rem] overflow-hidden border border-white/5 relative">
            <div id="viewer3d"></div>
        </main>
    </div>

    <script>
        // Inicializar Visor 3D
        let viewer = $3Dmol.createViewer("viewer3d", { backgroundColor: "none" });

        function switchTab(tabId) {
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('active'));
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('active');
            if(tabId === 'visual') resizeCanvas();
        }

        // Lógica de Laboratorio
        function runLabsAnalysis() {
            const input = document.getElementById('subInput').value;
            if(!input) return alert("Ingrese una sustancia.");
            
            const eff = Math.floor(Math.random() * 40 + 55);
            document.getElementById('effVal').innerText = eff + "%";
            document.getElementById('mutProb').innerText = Math.floor((100-eff)/4) + "%";
            document.getElementById('terminal').innerHTML += `> Analizando: ${input}... Afinidad detectada.<br>`;
            
            renderStructure("pdb:1SFO");
        }

        // Lógica de Patógenos
        const pData = {
            hiv: "Estructura: Retrovirus. Punto débil: Enzima Integrasa. Recomendación: Dolutegravir.",
            sars: "Estructura: Corona Spike. Punto débil: Proteasa Mpro. Recomendación: Paxlovid.",
            mrsa: "Estructura: Coco Gram+. Punto débil: Pared celular. Recomendación: Vancomicina."
        };

        function updatePathogenInfo() {
            const val = document.getElementById('pathogenSelect').value;
            const details = document.getElementById('pathogenDetails');
            if(pData[val]) {
                details.innerHTML = `<p class="bg-indigo-500/10 p-3 rounded-xl border border-indigo-500/20">${pData[val]}</p>`;
                renderStructure("pdb:1HHP");
            }
        }

        // Lógica de Genesis
        function runGenesisSimulation() {
            const log = document.getElementById('genesisLog');
            log.classList.remove('hidden');
            log.innerHTML = "> Iniciando secuencia...<br>";
            setTimeout(() => { log.innerHTML += "> Inserción de ADN exitosa.<br>> Organismo estable."; }, 1000);
        }

        // --- MOTOR KINETIC VIDEO (PARCHEADO) ---
        const canvas = document.getElementById('kineticCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = 250;
        }

        class Particle {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.radius = type === 'pathogen' ? 5 : 3;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.type === 'pathogen' ? '#ff4757' : '#2ecc71';
                ctx.fill();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        function addParticle(type) {
            for(let i=0; i<15; i++) particles.push(new Particle(type));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                // Colisiones
                if(p.type === 'agent') {
                    particles.forEach((p2, j) => {
                        if(p2.type === 'pathogen') {
                            if(Math.hypot(p.x - p2.x, p.y - p2.y) < 10) {
                                particles.splice(j, 1);
                            }
                        }
                    });
                }
            });
            requestAnimationFrame(animate);
        }

        function renderStructure(id) {
            viewer.clear();
            $3Dmol.download(id, viewer, {}, function() {
                viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
                viewer.zoomTo(); viewer.render();
            });
        }

        // Iniciar motor de video
        resizeCanvas();
        animate();
    </script>
</body>
</html>
