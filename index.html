<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioOS v10.2 | Ultra-Stability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background: #010409; color: #94a3b8; overflow: hidden; height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        #viewer3d { width: 100%; height: 100%; min-height: 400px; background: #000; border-radius: 2rem; }
        .hidden { display: none; }
        input, textarea { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(79, 70, 229, 0.3) !important; color: white !important; }
    </style>
</head>
<body class="flex flex-col h-screen p-4 gap-4">

    <header class="flex justify-between items-center px-4">
        <h1 class="text-xl font-black text-white italic tracking-tighter">Bio<span class="text-indigo-500">OS</span> v10.2</h1>
        <div class="flex gap-2">
            <button onclick="toggleSimPanel()" class="p-2 rounded-lg bg-green-600/20 border border-green-500/30 text-green-400 text-xs font-bold">⏱ SIMULACIÓN</button>
            <button onclick="alert('Sistema Sentinel Activo')" class="p-2 rounded-lg bg-indigo-600/20 border border-indigo-500/30 text-white font-bold">⋮</button>
        </div>
    </header>

    <div class="flex flex-1 gap-4 overflow-hidden">
        
        <div class="w-1/3 flex flex-col gap-4 overflow-y-auto pr-2">
            
            <div class="glass-panel p-4 rounded-3xl border-l-4 border-pink-500">
                <p class="text-[10px] font-bold text-pink-500 uppercase mb-2">Editor Genético</p>
                <textarea id="dnaInput" class="w-full h-16 p-2 text-xs rounded-lg outline-none" placeholder="ATGC..."></textarea>
                <button onclick="runDNA()" class="w-full mt-2 bg-pink-600 text-white font-bold py-2 rounded-xl text-[10px]">PREDECIR</button>
            </div>

            <div class="glass-panel p-4 rounded-3xl border-l-4 border-indigo-500">
                <p class="text-[10px] font-bold text-indigo-400 uppercase mb-2">Sintetizador</p>
                <input id="subInput" type="text" class="w-full p-3 text-sm rounded-lg outline-none" placeholder="Dengue + Carbono">
                <button onclick="runForge()" class="w-full mt-2 bg-indigo-600 text-white font-bold py-3 rounded-xl text-xs">SINTETIZAR</button>
            </div>

            <div class="glass-panel p-4 rounded-3xl border-l-4 border-green-500">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">Afinidad Terapéutica</p>
                <div class="flex items-center gap-3">
                    <span id="effVal" class="text-2xl font-black text-green-400">0%</span>
                    <div class="flex-1 bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div id="effBar" class="bg-green-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="terminal" class="glass-panel p-3 rounded-2xl flex-1 text-[9px] font-mono text-indigo-300 overflow-y-auto">
                > Sistema v10.2 listo...
            </div>
        </div>

        <div class="w-2/3 relative glass-panel rounded-3xl overflow-hidden p-2">
            <div id="viewer3d"></div>
        </div>
    </div>

    <div id="simPanel" class="hidden fixed inset-0 z-50 bg-black/95 p-10">
        <div class="max-w-4xl mx-auto h-full flex flex-col gap-6">
            <div class="flex justify-between items-center text-green-400 font-black italic">
                <span>CRONOS SIMULATOR</span>
                <button onclick="toggleSimPanel()" class="text-white">CERRAR [X]</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-6 rounded-3xl">
                    <input id="simInput" type="text" class="w-full p-4 rounded-xl mb-4" placeholder="Sustancia...">
                    <button onclick="startTemporalSim()" class="w-full bg-green-600 text-black font-bold py-3 rounded-xl">SIMULAR 24H</button>
                </div>
                <div id="mutationLog" class="glass-panel p-6 rounded-3xl text-[10px]">Esperando...</div>
            </div>
            <div id="narrativeBox" class="glass-panel p-6 rounded-3xl flex-1 text-sm italic text-slate-300 overflow-y-auto">
                El reporte aparecerá aquí.
            </div>
        </div>
    </div>

    <script>
        let viewer = $3Dmol.createViewer("viewer3d", { backgroundColor: "none" });
        
        function toggleSimPanel() { document.getElementById('simPanel').classList.toggle('hidden'); }

        function runForge() {
            const input = document.getElementById('subInput').value || "Desconocido";
            const eff = Math.floor(Math.random() * (98 - 30) + 30);
            document.getElementById('effVal').innerText = eff + "%";
            document.getElementById('effBar').style.width = eff + "%";
            document.getElementById('terminal').innerHTML += `<p>> Analizando: ${input}</p>`;
            renderStructure("pdb:1SFO");
        }

        function startTemporalSim() {
            const sub = document.getElementById('simInput').value || "Sustancia";
            document.getElementById('mutationLog').innerHTML = `<p class='text-yellow-400'>Analizando evolución...</p>`;
            setTimeout(() => {
                document.getElementById('mutationLog').innerHTML = `<p class='text-green-400'>Estable 12h</p><p class='text-red-400'>Mutación 20h</p>`;
                document.getElementById('narrativeBox').innerHTML = `<b>Análisis de ${sub}:</b> La sustancia bloquea el 80% de los receptores inicialmente, pero el virus desarrolla resistencia al final del ciclo.`;
            }, 1000);
        }

        function runDNA() { renderStructure("pdb:1TRZ"); }

        function renderStructure(id) {
            viewer.clear();
            // Truco para arreglar la pantalla negra: forzar redimensionamiento
            setTimeout(() => {
                $3Dmol.download(id, viewer, {}, function() {
                    viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
                    viewer.zoomTo();
                    viewer.render();
                    viewer.resize(); 
                });
            }, 50);
        }
        
        // Redimensionar automáticamente si la ventana cambia
        window.addEventListener('resize', () => { viewer.resize(); });
    </script>
</body>
</html>
