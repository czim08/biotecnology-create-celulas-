<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioOS v8.0 | Sentinel Pharma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background: #010409; color: #94a3b8; transition: background 0.5s; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        #viewer3d { width: 100%; height: 500px; border-radius: 2rem; }
        .danger-mode { background: #450a0a !important; }
        .menu-dots:hover { background: rgba(255,255,255,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 lg:p-8" id="mainBody">

    <div class="fixed top-6 right-6 z-50">
        <button onclick="toggleMenu()" class="menu-dots p-3 rounded-full transition-all text-white text-2xl">⋮</button>
        <div id="advancedMenu" class="hidden absolute right-0 mt-2 w-64 glass-panel rounded-2xl p-4 shadow-2xl border border-indigo-500/30">
            <h3 class="text-xs font-bold text-indigo-400 mb-3 uppercase tracking-widest">Funciones Pro</h3>
            <button onclick="alert('Análisis de Afinidad: Activo. Comparando con 5,000+ patógenos.')" class="w-full text-left text-[10px] text-white py-2 hover:text-indigo-300">🔬 Escáner de Curas</button>
            <button onclick="alert('Protocolo de Bioseguridad v2.0: Monitoreando síntesis.')" class="w-full text-left text-[10px] text-white py-2 hover:text-indigo-300">🛡️ Filtro Ético</button>
            <div class="border-t border-white/10 mt-2 pt-2">
                <p class="text-[8px] text-slate-500 italic text-center">BioOS Sentinel Intelligence</p>
            </div>
        </div>
    </div>

    <header class="max-w-7xl mx-auto mb-8">
        <h1 class="text-3xl font-black text-white">Bio<span class="text-indigo-500">OS</span> SENTINEL <span class="text-[10px] bg-red-600 px-2 py-1 rounded ml-2 uppercase">Pharma v8.0</span></h1>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="glass-panel p-5 rounded-3xl border-l-4 border-pink-500">
                <label class="text-[10px] font-bold text-pink-400 uppercase block mb-2">Editor Genético</label>
                <textarea id="dnaInput" class="w-full h-20 bg-transparent text-white text-xs outline-none" placeholder="ATGC..."></textarea>
                <button onclick="runDNA()" class="w-full mt-2 bg-pink-600 text-white font-bold py-2 rounded-xl text-[10px]">PREDECIR</button>
            </div>

            <div class="glass-panel p-5 rounded-3xl border-l-4 border-indigo-500" id="fusionPanel">
                <label class="text-[10px] font-bold text-indigo-400 uppercase block mb-2">Sintetizador de Sustancias</label>
                <input id="subInput" type="text" class="w-full bg-transparent p-3 rounded-xl text-sm text-white border border-white/10" placeholder="Ej: Insulina + COVID-19">
                <button onclick="runSentinelForge()" class="w-full mt-3 bg-indigo-600 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest">Sintetizar</button>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <div class="glass-panel p-4 rounded-2xl">
                    <p class="text-[9px] font-bold text-slate-500 uppercase">Afinidad Terapéutica (Efectividad)</p>
                    <div class="flex items-center gap-4">
                        <p id="affVal" class="text-2xl font-black text-green-400">0%</p>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div id="affBar" class="bg-green-500 h-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="terminal" class="glass-panel p-4 rounded-2xl h-24 overflow-y-auto text-[9px] font-mono">
                <p class="text-indigo-400">> Sentinel System: Online</p>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div id="viewer3d" class="glass-panel overflow-hidden"></div>
            <div id="warningMsg" class="hidden mt-4 p-4 bg-red-600 text-white font-bold rounded-2xl text-center animate-pulse">
                ⚠️ ALERTA DE BIOSEGURIDAD: SUSTANCIA RESTRINGIDA DETECTADA
            </div>
        </div>
    </main>

    <script>
        let viewer = $3Dmol.createViewer("viewer3d", { backgroundColor: "none" });
        
        // BASE DE DATOS DE PATÓGENOS Y ELEMENTOS
        const DB = {
            "covid": { name: "SARS-CoV-2 Proteína", pdb: "pdb:6VXX", affinity: 85 },
            "ebola": { name: "Virus Ébola", pdb: "pdb:4QAZ", affinity: 92 },
            "insulina": { name: "Insulina", pdb: "pdb:1TRZ", affinity: 10 },
            "antrax": { restricted: true },
            "cianuro": { restricted: true },
            "sarin": { restricted: true }
        };

        function toggleMenu() { document.getElementById('advancedMenu').classList.toggle('hidden'); }

        function runSentinelForge() {
            const input = document.getElementById('subInput').value.toLowerCase();
            const body = document.getElementById('mainBody');
            const warn = document.getElementById('warningMsg');
            const terminal = document.getElementById('terminal');

            // 1. FILTRO ÉTICO (IDEA 3)
            if (input.includes("antrax") || input.includes("cianuro") || input.includes("sarin")) {
                body.classList.add('danger-mode');
                warn.classList.remove('hidden');
                terminal.innerHTML += `<p class="text-red-500 font-bold">> PROTOCOLO DE BLOQUEO ACTIVADO...</p>`;
                return;
            }

            body.classList.remove('danger-mode');
            warn.classList.add('hidden');

            // 2. ESCÁNER DE CURAS (IDEA 1)
            let affinityScore = 0;
            if (input.includes("+")) {
                affinityScore = Math.floor(Math.random() * (95 - 40) + 40); // Simulación de reacción enzimática real
                document.getElementById('affVal').innerText = affinityScore + "%";
                document.getElementById('affBar').style.width = affinityScore + "%";
                terminal.innerHTML += `<p class="text-green-400">> Analizando acoplamiento molecular...</p>`;
            }

            renderStructure("pdb:1SFO");
        }

        function renderStructure(id) {
            viewer.clear();
            $3Dmol.download(id, viewer, {}, function() {
                viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
                viewer.zoomTo();
                viewer.render();
            });
        }
        
        function runDNA() { renderStructure("pdb:1TRZ"); }
    </script>
</body>
</html>
