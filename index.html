<script>
/* ===========================
   🔬 BASE DE DATOS EXPANDIDA
=========================== */

const ELEMENTS = ["hidrogeno","helio","litio","carbono","nitrogeno","oxigeno","sodio","potasio","calcio","hierro"];

const PATHOGENS = ["covid-19","influenza","vih","tuberculosis","salmonella"];

const DISEASES = ["cancer","diabetes","hipertension","asma"];

/* ===========================
   🌡 CONTROL DE TEMPERATURA
=========================== */

let temperature = 25;

function setTemperature(val){
    temperature = val;
    log(`> Temperatura ajustada a ${temperature}°C`);
}

/* ===========================
   🔍 DETECCIÓN UNIVERSAL
=========================== */

function detectAdvanced(input){
    let detected = [];

    ELEMENTS.forEach(e => {
        if(input.includes(e)) detected.push("Elemento: " + e);
    });

    PATHOGENS.forEach(p => {
        if(input.includes(p)) detected.push("Patógeno: " + p);
    });

    DISEASES.forEach(d => {
        if(input.includes(d)) detected.push("Enfermedad: " + d);
    });

    return detected;
}

/* ===========================
   🧠 IA ANALÍTICA MEJORADA
=========================== */

function advancedAIAnalysis(input){
    return {
        stability: (80 + Math.random()*20).toFixed(2),
        risk: (Math.random()*30).toFixed(2),
        effectiveness: (50 + Math.random()*50).toFixed(2)
    };
}

/* ===========================
   🧬 SIMULACIÓN GENÉTICA (NO REAL)
=========================== */

function generateFakeDNA(){
    const bases = ["A","T","C","G"];
    let seq = "";
    for(let i=0;i<120;i++){
        seq += bases[Math.floor(Math.random()*4)];
    }
    return seq;
}

/* ===========================
   🧾 FORMATO FASTA SIMULADO
=========================== */

function getFASTA(){
    const dna = generateFakeDNA();
    return `>Secuencia_Simulada\n${dna}`;
}

/* ===========================
   🛡 VALIDACIÓN DE SEGURIDAD
=========================== */

function safetyCheck(input){
    if(input.includes("virus") || input.includes("patogeno")){
        return "⚠ Riesgo detectado - simulación limitada";
    }
    return "✔ Seguro";
}

/* ===========================
   ⏳ LÍNEA DE TIEMPO SIMULADA
=========================== */

function timeline(){
    return {
        duration: (Math.random()*72).toFixed(1) + " horas",
        mutation: (Math.random()*30).toFixed(1) + " días"
    };
}

/* ===========================
   🧪 SIMULACIÓN EN HUMANO
=========================== */

function simulateHuman(){
    return {
        adverse: (Math.random()*20).toFixed(1) + "%",
        organDamage: (Math.random()*10).toFixed(1) + "%",
        liver: (Math.random()*15).toFixed(1) + "%"
    };
}

/* ===========================
   📡 CONEXIÓN EXTERNA SIMULADA
=========================== */

async function connectScientificServer(){
    log("> Conectando a servidor científico...");
    await new Promise(r => setTimeout(r,1000));
    log("> Librerías tipo Biopython/RDKit simuladas activas");
}

/* ===========================
   🧬 BUSCADOR NCBI SIMULADO
=========================== */

async function searchNCBI(query){
    log("> Consultando base NCBI...");
    await new Promise(r => setTimeout(r,800));
    log("> Resultado encontrado (simulado): " + query);
}

/* ===========================
   🧾 REPORTE COMPLETO
=========================== */

function generateFullReport(input){
    const ai = advancedAIAnalysis(input);
    const time = timeline();
    const human = simulateHuman();

    return `
=== REPORTE CIENTÍFICO ===
Entrada: ${input}

Estabilidad: ${ai.stability}%
Riesgo: ${ai.risk}%
Efectividad: ${ai.effectiveness}%

Duración: ${time.duration}
Mutación: ${time.mutation}

Reacciones adversas: ${human.adverse}
Daño órganos: ${human.organDamage}
Daño hepático: ${human.liver}

Seguridad: ${safetyCheck(input)}
`;
}

/* ===========================
   🖥 TERMINAL
=========================== */

function log(msg){
    const terminal = document.getElementById('terminal');
    terminal.innerHTML += `<p class="text-purple-400">${msg}</p>`;
}

/* ===========================
   🚀 OVERRIDE SIN TOCAR TU CÓDIGO
=========================== */

const originalForge = runAdvancedForge;

runAdvancedForge = async function(){
    const input = document.getElementById('substanceInput').value.toLowerCase();

    log("> IA avanzada iniciada");

    const detected = detectAdvanced(input);
    detected.forEach(d => log("> Detectado: " + d));

    await connectScientificServer();
    await searchNCBI(input);

    log("> Seguridad: " + safetyCheck(input));

    const fasta = getFASTA();
    log("> FASTA generado:");
    log(fasta);

    const report = generateFullReport(input);
    console.log(report);

    originalForge();
}
</script>
