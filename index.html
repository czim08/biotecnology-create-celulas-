<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioOS v10.1 | Restoration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background: #010409; color: #94a3b8; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        #viewer3d { width: 100%; height: 500px; border-radius: 2rem; background: #000; }
        .hidden { display: none; }
        .stat-card { background: rgba(30, 41, 59, 0.5); border-left: 4px solid #4f46e5; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="fixed top-6 right-6 z-50 flex gap-2">
        <button onclick="toggleSimPanel()" class="p-3 rounded-xl bg-green-600/20 hover:bg-green-600/40 border border-green-500/30">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <button onclick="alert('Modo Sentinel Activo')" class="p-3 rounded-xl bg-indigo-600/20 text-white font-bold text-xl">⋮</button>
    </div>

    <div id="simPanel" class="hidden fixed inset-0 z-40 bg-black/95 p-10 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black text-green-400 italic">CRONOS SIMULATOR</h2>
                <button onclick="toggleSimPanel()" class="text-white hover:text-red-500 font-bold">CERRAR [X]</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="glass-panel p-6 rounded-3xl">
                    <input id="simInput" type="text" class="w-full bg-black/50 p-4 rounded-xl text-white outline-none border border-green-500/30 mb-4" placeholder="Sustancia para simular 24h...">
                    <button onclick="startTemporalSim()" class="w-full bg-green-600 text-black font-black py-4 rounded-xl">INICIAR SIMULACIÓN</button>
                </div>
                <div class="glass-panel p-6 rounded-3xl text-[11px] space-y-2" id="mutationLog">
                    <p class="text-slate-500 italic">Datos de mutación en espera...</p>
                </div>
            </div>
            <div class="glass-panel p-8 rounded-3xl border-t-4 border-indigo-500">
                <h3 class="text-xs font-bold text-indigo-400 uppercase mb-4 tracking-widest">Reporte Narrativo</h3>
                <div id="narrativeBox" class="text-sm italic leading-relaxed text-slate-300">Cargue una sustancia para generar el análisis explicativo.</div>
            </div>
        </div>
    </div>

    <header class="max-w-7xl mx-auto mb-10">
        <h1 class="text-4xl font-black text-white tracking-tighter italic">Bio<span class="text-indigo-500">OS</span> QUANTUM <span class="text-xs bg-indigo-600 px-3 py-1 rounded ml-3 uppercase">v10.1 RESTORATION</span></h1>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel p-6 rounded-3xl border-l-4 border-pink-500">
                <label class="text-[10px] font-bold text-pink-500 uppercase block mb-3 underline">Editor de ADN</label>
                <textarea id="dnaInput" class="w-full h-24 bg-transparent text-white text-xs outline-none" placeholder="ATGC..."></textarea>
                <button onclick="runDNA()" class="w-full mt-3 bg-pink-600 text-white font-bold py-2 rounded-xl text-[10px]">PREDECIR</button>
            </div>

            <div class="glass-panel p-6 rounded-3xl border-l-4 border-indigo-500">
                <label class="text-[10px] font-bold text-indigo-400 uppercase block mb-3 underline">Sintetizador Rápido</label>
                <input id="subInput" type="text" class="w-full bg-black/40 p-4 rounded-xl text-sm text-white outline-none" placeholder="Ej: Dengue + Carbono">
                <button onclick="runForge()" class="w-full mt-4 bg-indigo-600 text-white font-black py-4 rounded-xl text-xs">SINTETIZAR</button>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="stat-card p-5 rounded-2xl">
                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">Afinidad Terapéutica (Efectividad)</p>
                    <div class="flex items-center gap-4">
                        <span id="effVal" class="text-3xl font-black text-green-400">0%</span>
                        <div class="flex-1 bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div id="effBar" class="bg-green-500 h-full transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="terminal" class="glass-panel p-4 rounded-2xl h-24 overflow-y-auto text-[9px] font-mono text-indigo-300 bg-black/40">
                > Sistemas restaurados... listo para análisis.
            </div>
        </div>

        <div class="lg:col-span-8">
            <div id="viewer3d"></div>
        </div>
    </main>

    <script>
        let viewer = $3Dmol.createViewer("viewer3d", { backgroundColor: "none" });
        
        function toggleSimPanel() { document.getElementById('simPanel').classList.toggle('hidden'); }

        function runForge() {
            const input = document.getElementById('subInput').value.toLowerCase();
            const eff = Math.floor(Math.random() * (95 - 35) + 35);
            
            document.getElementById('effVal').innerText = eff + "%";
            document.getElementById('effBar').style.width = eff + "%";
            document.getElementById('terminal').innerHTML += `<p>> Analizando afinidad para ${input}...</p>`;
            
            renderStructure("pdb:1SFO");
        }

        function startTemporalSim() {
            const sub = document.getElementById('simInput').value || "Sustancia";
            const narrative = document.getElementById('narrativeBox');
            const log = document.getElementById('mutationLog');
            
            log.innerHTML = `<p class="text-yellow-400">> Simulando efectos en 24h...</p>`;
            setTimeout(() => {
                log.innerHTML = `<p class="text-green-400">> 12h: Neutralización estable.</p><p class="text-red-400">> 22h: Mutación detectada.</p>`;
                narrative.innerHTML = `<b>Simulación de ${sub}:</b> Se observa una efectividad inicial alta contra el virus, pero tras 22 horas la estructura viral intenta mutar para evadir la cura.`;
            }, 1500);
        }

        function runDNA() { renderStructure("pdb:1TRZ"); }

        function renderStructure(id) {
            viewer.clear();
            $3Dmol.download(id, viewer, {}, function() {
                viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
                viewer.zoomTo();
                viewer.render();
                viewer.resize();
            });
        }
    </script>
</body>
</html>
